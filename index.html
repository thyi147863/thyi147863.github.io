<body>

<div class="language-buttons">
    <button class="button" onclick="changeLanguage('english')">English</button>
    <button class="button" onclick="changeLanguage('hebrew')">עברית</button>
    <button class="button" onclick="changeLanguage('ukrainian')">Українська</button>
</div>

<h1 class="header" id="title">Jerusalem And Its Sites</h1>

<p class="text" id="description">
Jerusalem is one of the oldest cities in the world.
It contains famous places such as the Western Wall,
Mahane Yehuda Market, and the Old City.
</p>

<div class="gallery">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/60/Jerusalem_night_7088.JPG" class="image-box" alt="Jerusalem">

    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d4/Westernwall2.jpg" class="image-box" alt="Western Wall">

    <img src="https://upload.wikimedia.org/wikipedia/commons/5/59/Jerusalem_Mahane_Yehuda_Market.jpg" class="image-box" alt="Market">
</div>

<br>

<button class="button" onclick="showMessage()">Click Me</button>

<script>
function showMessage() {
    alert("Welcome to the Jerusalem Project!");
}

function changeLanguage(language) {

    if(language === 'english') {
        document.getElementById('title').innerHTML = 'Jerusalem And Its Sites';

        document.getElementById('description').innerHTML =
        'Jerusalem is one of the oldest cities in the world. It contains famous places such as the Western Wall, Mahane Yehuda Market, and the Old City.';
    }

    if(language === 'hebrew') {
        document.getElementById('title').innerHTML = 'ירושלים ואתריה';

        document.getElementById('description').innerHTML =
        'ירושלים היא אחת הערים העתיקות בעולם. בעיר נמצאים אתרים מפורסמים כמו הכותל המערבי, שוק מחנה יהודה והעיר העתיקה.';
    }

    if(language === 'ukrainian') {
        document.getElementById('title').innerHTML = 'Єрусалим та його пам’ятки';

        document.getElementById('description').innerHTML =
        'Єрусалим — одне з найстаріших міст у світі. Тут знаходяться відомі місця, такі як Стіна Плачу, ринок Махане Єгуда та Старе місто.';
    }
}
</script>

</body>
</html>
<style>
body {
    background: linear-gradient(to bottom, #ffffff, #dbeafe);
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    text-align: center;
}

.header {
    color: #0038a8;
    font-size: 48px;
    margin-bottom: 20px;
    text-shadow: 2px 2px 4px lightgray;
}

.text {
    font-size: 22px;
    line-height: 1.8;
    max-width: 900px;
    margin: auto;
    color: #222;
}

.gallery {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 30px;
}

.image-box {
    width: 320px;
    height: 220px;
    object-fit: cover;
    border-radius: 20px;
    border: 5px solid gold;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.image-box:hover {
    transform: scale(1.05);
}

.button {
    background: #0038a8;
    color: white;
    border: none;
    padding: 14px 24px;
    margin: 10px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 18px;
    transition: 0.3s;
}

.button:hover {
    background: #001f5c;
    transform: scale(1.08);
}

.language-buttons {
    margin-bottom: 25px;
}

.flag-line {
    width: 200px;
    height: 6px;
    background: #0038a8;
    margin: 20px auto;
    border-radius: 10px;
}

.footer {
    margin-top: 40px;
    font-size: 18px;
    color: #555;
}
</style>

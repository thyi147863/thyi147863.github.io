<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>המצאות ישראליות</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav>

        <h1 id="mainTitle">
            המצאות ישראליות ששינו את העולם
        </h1>

        <button onclick="changeLanguage()" id="langBtn">
            English / עברית
        </button>

    </nav>

    <!-- HERO -->
    <section class="hero">

        <h2 id="heroTitle">
            חדשנות ישראלית
        </h2>

        <p id="heroText">
            הכירו המצאות ישראליות שהשפיעו על העולם.
        </p>

    </section>

    <!-- CARDS -->
    <section class="cards">

        <!-- WAZE -->
        <div class="card">

            <img
                src="https://upload.wikimedia.org/wikipedia/commons/8/89/Waze_logo_2022.svg"
                alt="Waze"
            >

            <h2 id="wazeTitle">
                Waze
            </h2>

            <p id="wazeText">
                אפליקציית ניווט ישראלית שנמכרה לגוגל.
            </p>

        </div>

        <!-- USB -->
        <div class="card">

            <img
                src="https://upload.wikimedia.org/wikipedia/commons/7/7d/USB_flash_drive.jpg"
                alt="USB"
            >

            <h2 id="usbTitle">
                Disk On Key
            </h2>

            <p id="usbText">
                פיתוח ישראלי ששינה את עולם האחסון.
            </p>

        </div>

        <!-- IRON DOME -->
        <div class="card">

            <img
                src="https://upload.wikimedia.org/wikipedia/commons/1/1d/Iron_Dome.jpg"
                alt="Iron Dome"
            >

            <h2 id="ironTitle">
                כיפת ברזל
            </h2>

            <p id="ironText">
                מערכת הגנה אווירית מתקדמת שפותחה בישראל.
            </p>

        </div>

    </section>>

    </section>

    <script src="script.js"></script>

</body>
</html>
